version: 2
registries:
  npm-github:
    type: npm-registry
    url: https://npm.pkg.github.com
    token: ${{secrets.READER_TOKEN}}
updates:
  - package-ecosystem: npm
    directory: "/"
    schedule:
      interval: weekly
    registries:
      - npm-github
    cooldown:
      default-days: 7
    groups:
      navikt:
        patterns:
          - "@navikt/*"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "react-markdown"
          - "@types/react"
          - "@types/react-dom"
      next:
        patterns:
          - "next"
          - "next-*"
          - "eslint-config-next"
      grafana:
        patterns:
          - "@grafana/faro*"
      npm:
        patterns:
          - "*"
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
    cooldown:
      default-days: 7
    groups:
      github-actions:
        patterns:
          - "*"
